<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ZenTube — Try it</title>
  <script>
    // ── Chrome API stub ─────────────────────────────────────────
    // Seeds demo state so the real popup.js runs without an extension context.
    const _today = new Date().toISOString().slice(0, 10);
    const _syncStore = {
      dfyt_settings: {
        enabled: true,
        hideNotificationBell: true,
        hideFeed: true,
        disableAutoplay: true,
        hideShortsVideos: true,
        hideShortsTab: true,
        hideSubscriptionsTab: true,
        showOnlyLibrary: false,
        hideRelatedVideos: true,
        hideSidebarRelated: true,
        hideSidebarLiveChat: true,
        hideSidebarPlaylists: true,
        hideMerch: true,
        hideComments: true,
        disablePlaylists: false,
        dailyLimit: 30,
      }
    };
    const _localStore = {
      dfyt_stats: { totalMs: 11400000, todayMs: 2520000, todayDate: _today }
    };

    window.chrome = {
      storage: {
        sync: {
          get(key, cb) { cb({ [key]: JSON.parse(JSON.stringify(_syncStore[key] || {})) }); },
          set(obj, cb) { Object.assign(_syncStore, JSON.parse(JSON.stringify(obj))); if (cb) cb(); }
        },
        local: {
          get(key, cb) { cb({ [key]: JSON.parse(JSON.stringify(_localStore[key] || {})) }); },
          set(obj, cb) { Object.assign(_localStore, obj); if (cb) cb(); }
        },
        onChanged: { addListener() {} }
      },
      action: { setIcon() {} }
    };
  </script>
  <style>
    :root {
      --bg: #fff;
      --bg-muted: #f9fafb;
      --bg-hover: #f3f4f6;
      --border: #e5e7eb;
      --border-md: #d1d5db;
      --text: #111827;
      --text-2: #374151;
      --text-muted: #6b7280;
      --text-subtle: #9ca3af;
      --primary: #18181b;
      --red: #dc2626;
      --green: #16a34a;
      --green-bg: #f0fdf4;
      --green-border: #bbf7d0;
      --r: 10px;
      --r-sm: 6px;
      --r-xs: 4px;
      --r-pill: 999px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      width: 340px;
      -webkit-font-smoothing: antialiased;
      font-size: 13px;
    }

    .header {
      padding: 13px 15px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }
    .header-left { display: flex; align-items: center; gap: 9px; min-width: 0; }
    .logo { width: 32px; height: 32px; display: grid; place-items: center; flex-shrink: 0; }
    .logo svg { width: 32px; height: 32px; display: block; }
    .brand-name { font-size: 14px; font-weight: 650; color: var(--text); letter-spacing: -0.35px; line-height: 1; }
    .brand-sub { font-size: 11px; color: var(--text-subtle); margin-top: 2px; line-height: 1; }

    .master-area { display: flex; align-items: center; gap: 7px; flex-shrink: 0; }
    .master-lbl { font-size: 11.5px; font-weight: 500; color: var(--text-subtle); min-width: 18px; text-align: right; transition: color 0.15s; }
    .master-lbl.on { color: var(--text-2); }

    .sw { position: relative; display: inline-flex; flex-shrink: 0; cursor: pointer; }
    .sw input { position: absolute; opacity: 0; width: 0; height: 0; pointer-events: none; }
    .sw-track { width: 36px; height: 20px; background: var(--border-md); border-radius: 10px; position: relative; transition: background 0.14s; }
    .sw-track::after { content: ''; position: absolute; width: 16px; height: 16px; background: #fff; border-radius: 50%; top: 2px; left: 2px; transition: transform 0.14s; box-shadow: 0 1px 3px rgba(0,0,0,.22), 0 0 0 .5px rgba(0,0,0,.06); }
    .sw input:checked + .sw-track { background: var(--primary); }
    .sw input:checked + .sw-track::after { transform: translateX(16px); }
    .sw-lg .sw-track { width: 42px; height: 23px; border-radius: 11.5px; }
    .sw-lg .sw-track::after { width: 19px; height: 19px; }
    .sw-lg input:checked + .sw-track::after { transform: translateX(19px); }

    .hr { height: 1px; background: var(--border); }

    .stat { padding: 8px 15px; display: flex; align-items: center; gap: 7px; background: var(--green-bg); border-bottom: 1px solid var(--green-border); }
    .stat svg { color: var(--green); flex-shrink: 0; }
    .stat-text { font-size: 11.5px; font-weight: 500; color: #15803d; }
    .stat-text b { font-weight: 700; }
    .stat.hidden { display: none; }

    .presets { padding: 10px 15px; display: flex; gap: 6px; border-bottom: 1px solid var(--border); }
    .preset { flex: 1; padding: 5px 8px; font-size: 11.5px; font-weight: 550; font-family: inherit; color: var(--text-muted); background: var(--bg); border: 1px solid var(--border); border-radius: var(--r-pill); cursor: pointer; text-align: center; transition: all 0.1s; line-height: 1.2; }
    .preset:hover { background: var(--bg-hover); border-color: var(--border-md); color: var(--text-2); }
    .preset.active { background: var(--primary); border-color: var(--primary); color: #fff; }
    .preset-sub { font-size: 9px; font-weight: 400; opacity: 0.75; display: block; margin-top: 1px; }

    .settings { padding: 10px 12px 10px; display: flex; flex-direction: column; gap: 8px; transition: opacity 0.18s; }
    .settings.dim { opacity: 0.35; pointer-events: none; }

    .card { border: 1px solid var(--border); border-radius: var(--r); overflow: hidden; }
    .card-hd { padding: 7px 12px; background: var(--bg-muted); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; cursor: pointer; user-select: none; transition: background 0.08s; }
    .card-hd:hover { background: var(--bg-hover); }
    .card-hd:hover .hd-action { opacity: 1; }
    .hd-label { font-size: 10px; font-weight: 650; letter-spacing: 0.5px; text-transform: uppercase; color: var(--text-subtle); }
    .hd-action { font-size: 10px; font-weight: 550; color: var(--text-subtle); opacity: 0; transition: opacity 0.1s; letter-spacing: 0; text-transform: none; }

    .row { display: flex; align-items: center; justify-content: space-between; padding: 9px 12px; gap: 10px; cursor: pointer; border-bottom: 1px solid var(--border); transition: background 0.07s; }
    .row:last-child { border-bottom: none; }
    .row:hover { background: var(--bg-muted); }
    .row:active { background: var(--bg-hover); }
    .row-lbl { font-size: 12.5px; font-weight: 440; color: var(--text-2); display: flex; align-items: center; gap: 5px; flex: 1; user-select: none; line-height: 1.35; }
    .badge { font-size: 9px; font-weight: 600; background: #fef3c7; color: #92400e; border: 1px solid #fde68a; border-radius: var(--r-xs); padding: 1px 4px; flex-shrink: 0; }

    .footer { border-top: 1px solid var(--border); padding: 9px 14px; display: flex; flex-direction: column; align-items: stretch; gap: 7px; }
    .saved { font-size: 11px; font-weight: 500; color: var(--green); display: flex; align-items: center; gap: 4px; opacity: 0; transition: opacity 0.22s; position: absolute; }
    .saved.show { opacity: 1; }
    .row-icon { width: 14px; height: 14px; flex-shrink: 0; color: var(--text-subtle); }

    .limit-row { padding: 10px 15px; display: flex; align-items: center; justify-content: space-between; gap: 10px; border-bottom: 1px solid var(--border); }
    .limit-lbl { display: flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 550; color: var(--text-2); flex-shrink: 0; }
    .limit-pills { display: flex; gap: 4px; align-items: center; }
    .lpill { padding: 4px 8px; font-size: 11px; font-weight: 550; font-family: inherit; color: var(--text-muted); background: var(--bg); border: 1px solid var(--border); border-radius: 6px; cursor: pointer; transition: all 0.1s; line-height: 1; white-space: nowrap; }
    .lpill:hover { border-color: var(--border-md); color: var(--text-2); background: var(--bg-muted); }
    .lpill.active { background: var(--primary); border-color: var(--primary); color: #fff; }
    .lcustom { width: 40px; padding: 3px 5px; font-size: 11px; font-weight: 550; font-family: inherit; color: var(--text-2); background: var(--bg); border: 1px solid var(--border); border-radius: 6px; text-align: center; outline: none; transition: border-color 0.1s; -moz-appearance: textfield; }
    .lcustom::-webkit-inner-spin-button, .lcustom::-webkit-outer-spin-button { -webkit-appearance: none; }
    .lcustom:focus { border-color: var(--primary); }
    .lcustom::placeholder { color: var(--text-subtle); font-weight: 400; }
    .lcustom.has-value { background: var(--primary); border-color: var(--primary); color: #fff; }
    .lcustom.has-value::placeholder { color: rgba(255,255,255,.5); }
    .footer { display: none; }
  </style>
</head>

<script>
const SETTINGS_KEY = 'dfyt_settings';
const STATS_KEY = 'dfyt_stats';

const DEFAULTS = {
  enabled: true, hideNotificationBell: false, hideFeed: false, disableAutoplay: true,
  hideShortsVideos: false, hideShortsTab: false, hideSubscriptionsTab: false,
  showOnlyLibrary: false, hideRelatedVideos: true, hideSidebarRelated: true,
  hideSidebarLiveChat: false, hideSidebarPlaylists: false, hideMerch: false,
  hideComments: false, disablePlaylists: false, dailyLimit: 0,
};

const SECTIONS = {
  navigation: ['hideNotificationBell', 'hideShortsTab', 'hideSubscriptionsTab', 'showOnlyLibrary'],
  homepage: ['hideFeed', 'hideShortsVideos'],
  watching: ['disableAutoplay', 'hideRelatedVideos', 'hideSidebarRelated', 'hideSidebarLiveChat',
             'hideSidebarPlaylists', 'hideMerch', 'hideComments', 'disablePlaylists'],
};

const FEATURE_KEYS = Object.keys(DEFAULTS).filter(k => k !== 'enabled' && k !== 'dailyLimit');
const PRESET_MINS = [0, 15, 30, 60];

const PRESETS = {
  light: { disableAutoplay: true, hideSidebarRelated: true, hideRelatedVideos: false, hideNotificationBell: false, hideFeed: false, hideShortsVideos: false, hideShortsTab: false, hideSubscriptionsTab: false, showOnlyLibrary: false, hideSidebarLiveChat: false, hideSidebarPlaylists: false, hideMerch: false, hideComments: false, disablePlaylists: false },
  balanced: { disableAutoplay: true, hideSidebarRelated: true, hideRelatedVideos: true, hideNotificationBell: true, hideShortsTab: true, hideMerch: true, hideFeed: false, hideShortsVideos: false, hideSubscriptionsTab: false, showOnlyLibrary: false, hideSidebarLiveChat: false, hideSidebarPlaylists: false, hideComments: false, disablePlaylists: false },
  zen: { disableAutoplay: true, hideNotificationBell: true, hideFeed: true, hideShortsVideos: true, hideShortsTab: true, hideSubscriptionsTab: true, hideRelatedVideos: true, hideSidebarRelated: true, hideSidebarLiveChat: true, hideSidebarPlaylists: true, hideMerch: true, hideComments: true, showOnlyLibrary: false, disablePlaylists: false },
};

function readLimit() {
  const custom = document.getElementById('customLimitInput');
  const activePill = document.querySelector('.lpill.active');
  if (activePill) return parseInt(activePill.dataset.min, 10) || 0;
  if (custom?.value) return Math.max(1, Math.min(480, parseInt(custom.value, 10) || 0));
  return 0;
}

function getValues() {
  const s = { enabled: document.getElementById('enabled').checked, dailyLimit: readLimit() };
  for (const key of FEATURE_KEYS) { const el = document.getElementById(key); s[key] = el ? el.checked : DEFAULTS[key]; }
  return s;
}

function detectPreset(s) {
  for (const [name, preset] of Object.entries(PRESETS)) {
    if (FEATURE_KEYS.every(k => !!preset[k] === !!s[k])) return name;
  }
  return null;
}

function fmtMs(ms) {
  const m = Math.floor(ms / 60000);
  if (m < 1) return null;
  const h = Math.floor(m / 60), rem = m % 60;
  if (h === 0) return `${m} min`;
  return rem === 0 ? `${h} hr` : `${h} hr ${rem} min`;
}

function showSaved() {
  const el = document.getElementById('savedMsg');
  const nudge = document.getElementById('supportNudge');
  el.classList.add('show');
  if (nudge) nudge.style.opacity = '0';
  setTimeout(() => { el.classList.remove('show'); if (nudge) nudge.style.opacity = '1'; }, 1600);
}

function setExtensionIcon() {}

function renderUI(s) {
  const on = s.enabled !== false;
  document.getElementById('enabled').checked = on;
  document.getElementById('masterLbl').textContent = on ? 'On' : 'Off';
  document.getElementById('masterLbl').classList.toggle('on', on);
  document.getElementById('settingsArea').classList.toggle('dim', !on);

  for (const key of FEATURE_KEYS) { const el = document.getElementById(key); if (el) el.checked = !!s[key]; }

  const count = FEATURE_KEYS.filter(k => s[k]).length;
  document.getElementById('brandSub').textContent = on
    ? (count === 0 ? 'No features active' : `${count} feature${count !== 1 ? 's' : ''} active`)
    : 'Paused';

  const activePreset = detectPreset(s);
  document.querySelectorAll('.preset').forEach(btn => btn.classList.toggle('active', btn.dataset.preset === activePreset));

  for (const [section, keys] of Object.entries(SECTIONS)) {
    const allOn = keys.every(k => s[k]);
    const el = document.getElementById(`action-${section}`);
    if (el) el.textContent = allOn ? 'Disable all' : 'Enable all';
  }

  const limit = s.dailyLimit || 0;
  document.querySelectorAll('.lpill').forEach(btn => btn.classList.toggle('active', parseInt(btn.dataset.min, 10) === limit));
  const customEl = document.getElementById('customLimitInput');
  if (customEl) {
    const hasCustom = limit > 0 && !PRESET_MINS.includes(limit);
    customEl.value = hasCustom ? limit : '';
    customEl.classList.toggle('has-value', hasCustom);
  }
}

function save() {
  const s = getValues();
  chrome.storage.sync.set({ [SETTINGS_KEY]: s }, showSaved);
  renderUI(s);
}

function loadStats() {
  chrome.storage.local.get(STATS_KEY, (res) => {
    const s = res[STATS_KEY] || {};
    const today = new Date().toISOString().slice(0, 10);
    const totalMs = s.totalMs || 0;
    const todayMs = s.todayDate === today ? (s.todayMs || 0) : 0;
    const totalFmt = fmtMs(totalMs);
    if (!totalFmt) return;
    document.getElementById('statBar').classList.remove('hidden');
    const todayFmt = fmtMs(todayMs);
    document.getElementById('statText').innerHTML = (todayFmt && todayMs > 0)
      ? `<b>${todayFmt}</b> focused today &nbsp;·&nbsp; ${totalFmt} total`
      : `<b>${totalFmt}</b> focused on YouTube`;
  });
}

document.addEventListener('DOMContentLoaded', () => {
  chrome.storage.sync.get(SETTINGS_KEY, (result) => {
    renderUI({ ...DEFAULTS, ...(result[SETTINGS_KEY] || {}) });
  });

  loadStats();

  document.getElementById('enabled').addEventListener('change', save);
  for (const key of FEATURE_KEYS) { document.getElementById(key)?.addEventListener('change', save); }

  document.querySelectorAll('.preset').forEach(btn => {
    btn.addEventListener('click', () => {
      const preset = PRESETS[btn.dataset.preset];
      if (!preset) return;
      for (const key of FEATURE_KEYS) { const el = document.getElementById(key); if (el) el.checked = !!preset[key]; }
      save();
    });
  });

  document.querySelectorAll('.card-hd').forEach(hd => {
    hd.addEventListener('click', () => {
      const keys = SECTIONS[hd.dataset.section];
      if (!keys) return;
      const allOn = keys.every(k => document.getElementById(k)?.checked);
      for (const k of keys) { const el = document.getElementById(k); if (el) el.checked = !allOn; }
      save();
    });
  });

  document.querySelectorAll('.lpill').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.lpill').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const customEl = document.getElementById('customLimitInput');
      if (customEl) { customEl.value = ''; customEl.classList.remove('has-value'); }
      save();
    });
  });

  document.getElementById('customLimitInput')?.addEventListener('input', (e) => {
    const val = parseInt(e.target.value, 10);
    if (val > 0) { document.querySelectorAll('.lpill').forEach(b => b.classList.remove('active')); e.target.classList.add('has-value'); }
    else { e.target.classList.remove('has-value'); }
  });

  document.getElementById('customLimitInput')?.addEventListener('change', save);
  document.getElementById('customLimitInput')?.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') { e.target.blur(); save(); }
  });
});
</script>
</body>
</html>
