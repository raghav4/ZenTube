name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Package extension
        run: |
          zip -r zentube-${{ github.ref_name }}.zip \
            manifest.json \
            content.js \
            content.css \
            popup.html \
            popup.js \
            icons/ \
            --exclude "*.DS_Store"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "ZenTube ${{ github.ref_name }}"
          files: zentube-${{ github.ref_name }}.zip
          generate_release_notes: true
          make_latest: true
